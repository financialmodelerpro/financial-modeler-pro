<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Modeler Pro — Platform Hub</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        #fmp-loader {
            position: fixed; inset: 0; background: #0F2B46;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 20px; z-index: 99999;
            font-family: Inter, sans-serif; transition: opacity 0.5s ease;
        }
        #fmp-loader.fade-out { opacity: 0; pointer-events: none; }
        .fmp-logo  { font-size: 52px; animation: fmp-pulse 1.8s ease-in-out infinite; }
        .fmp-title { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.01em; }
        .fmp-sub   { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: -12px; }
        .fmp-track { width: 220px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 99px; overflow: hidden; margin-top: 4px; }
        .fmp-bar   { height: 100%; width: 0%; background: linear-gradient(90deg,#3b82f6,#60a5fa); border-radius: 99px; transition: width 0.3s ease; }
        @keyframes fmp-pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.1);opacity:0.7} }
    </style>
</head>
<body>

    <div id="fmp-loader">
        <div class="fmp-logo">💼</div>
        <div class="fmp-title">Financial Modeler Pro</div>
        <div class="fmp-sub">Initialising platform…</div>
        <div class="fmp-track"><div class="fmp-bar" id="fmp-bar"></div></div>
    </div>

    <div id="root"></div>

    <script>
        var _bar = document.getElementById('fmp-bar');
        var _pct = 0;
        var _iv  = setInterval(function() {
            _pct = Math.min(_pct + Math.random() * 7, 90);
            _bar.style.width = _pct + '%';
        }, 250);
        window._fmpLoaderDone = function() {
            clearInterval(_iv);
            _bar.style.width = '100%';
            setTimeout(function() {
                var el = document.getElementById('fmp-loader');
                if (el) { el.classList.add('fade-out'); setTimeout(function(){ el.remove(); }, 500); }
            }, 300);
        };
    </script>

    <!-- Load order matters: each file depends on globals from files above it -->
    <script type="text/babel" data-presets="react" src="js/settings.js"></script>
    <script type="text/babel" data-presets="react" src="js/projects.js"></script>
    <script type="text/babel" data-presets="react" src="js/branding.js"></script>
    <script type="text/babel" data-presets="react" src="js/portal.js"></script>
    <!-- app.js mounts React as soon as AppRoot (portal.js) is ready — before refm compiles -->
    <script type="text/babel" data-presets="react" src="js/app.js"></script>
    <!-- refm-platform.js loads last — portal is already visible while this compiles -->
    <script type="text/babel" data-presets="react" src="js/refm-platform.js"></script>

</body>
</html>
